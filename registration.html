<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .registration-form {
            background-color: #fff;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 350px;
        }

        .registration-form h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .registration-form label {
            display: block;
            margin-top: 15px;
            color: #555;
        }

        .registration-form input[type="text"],
        .registration-form input[type="email"],
        .registration-form input[type="password"],
        .registration-form select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        .registration-form .radio-group,
        .registration-form .checkbox-group {
            margin-top: 10px;
        }

        .registration-form input[type="radio"],
        .registration-form input[type="checkbox"] {
            margin-right: 5px;
        }

        .registration-form button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .registration-form button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <nav>
    <ul>
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="courses.html">Courses</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="https://www.uetpeshawar.edu.pk" target="_blank">UET Website</a></li>
    </ul>
</nav>

    <form class="registration-form">
        <h2>Student Registration</h2>

        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>

        <label for="regno">Registration Number</label>
        <input type="text" id="regno" name="regno" placeholder="Enter your registration number" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>

        <label for="course">Select Course</label>
        <select id="course" name="course" required>
            <option value="">--Choose a course--</option>
            <option value="webtech">Web Technology</option>
            <option value="programming">Programming</option>
            <option value="math">Mathematics</option>
            <option value="physics">Physics</option>
        </select>

        <label>Semester</label>
        <div class="radio-group">
            <input type="radio" id="sem1" name="semester" value="1" required>
            <label for="sem1">1st</label>
            <input type="radio" id="sem2" name="semester" value="2">
            <label for="sem2">2nd</label>
            <input type="radio" id="sem3" name="semester" value="3">
            <label for="sem3">3rd</label>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">I agree to the terms and conditions</label>
        </div>

        <button type="submit">Register</button>
    </form>

</body>
</html>
